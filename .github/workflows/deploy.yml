name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Install dependencies
        run: npm install
        
      - name: Build with Vite
        run: npm run build && cp ./dist/index.html ./dist/404.html
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyCb1SUbOHd0iicYVPK_Y9Sfe33Ud0Tsg60"
          VITE_FIREBASE_AUTH_DOMAIN: "codovate-784ab.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "codovate-784ab"
          VITE_FIREBASE_STORAGE_BUCKET: "codovate-784ab.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "620492991139"
          VITE_FIREBASE_APP_ID: "1:620492991139:web:56ba93f90ac7a955aaad16"
          VITE_FIREBASE_MEASUREMENT_ID: "G-1XL6G2MBL2"
          VITE_API_URL: "https://codovate-prod.onrender.com/api"
          VITE_SOCKET_URL: "https://codovate-prod.onrender.com"
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
